<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StarsAlign Studio</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        height: 100%;
        background: #0f1b2d;
        color: #e0edf7;
        font-family: -apple-system, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
        overflow: hidden;
      }
      .wrap {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 28px;
        user-select: none;
      }
      .ring {
        width: 72px;
        height: 72px;
        border: 3px solid rgba(123, 196, 246, 0.18);
        border-top-color: #7bc4f6;
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .title {
        font-size: 20px;
        font-weight: 600;
        letter-spacing: 2px;
        background: linear-gradient(135deg, #7bc4f6, #e0edf7);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .hint { font-size: 13px; color: #5baef0; opacity: 0.8; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <!-- 品牌标识:逐坐标复刻 apps/web/components/brand/logo.tsx 的 LogoMark(星系环 + 两颗四角星),
           与 icon.ico / app 内 logo 同源同几何。splash 是裸 HTML 拿不到 CSS 变量,故用固定深色适配 hex。 -->
      <svg class="logo" width="104" height="104" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="StarsAlign Studio" role="img">
        <defs>
          <linearGradient id="sa-ring-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#5BAEE6" stop-opacity="0.4" />
            <stop offset="35%" stop-color="#7BC4F6" stop-opacity="0.9" />
            <stop offset="65%" stop-color="#E0EDF7" stop-opacity="1" />
            <stop offset="100%" stop-color="#5BAEE6" stop-opacity="0.4" />
          </linearGradient>
          <radialGradient id="sa-star-grad" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1" />
            <stop offset="40%" stop-color="#E0EDF7" stop-opacity="0.95" />
            <stop offset="100%" stop-color="#7BC4F6" stop-opacity="0.3" />
          </radialGradient>
        </defs>
        <g transform="rotate(-22 32 32)" stroke="url(#sa-ring-grad)" fill="none" stroke-linecap="round">
          <ellipse cx="32" cy="32" rx="26" ry="7.5" stroke-width="0.7" />
          <ellipse cx="32" cy="32" rx="23" ry="6.5" stroke-width="0.8" />
          <ellipse cx="32" cy="32" rx="20" ry="5.5" stroke-width="0.9" opacity="0.85" />
          <ellipse cx="32" cy="32" rx="17" ry="4.5" stroke-width="0.7" opacity="0.6" />
        </g>
        <g transform="translate(46 18)">
          <path d="M 0 -7 L 1.4 -1.4 L 7 0 L 1.4 1.4 L 0 7 L -1.4 1.4 L -7 0 L -1.4 -1.4 Z" fill="url(#sa-star-grad)" />
          <circle cx="0" cy="0" r="1.5" fill="#FFFFFF" />
        </g>
        <g transform="translate(20 44)">
          <path d="M 0 -4 L 0.8 -0.8 L 4 0 L 0.8 0.8 L 0 4 L -0.8 0.8 L -4 0 L -0.8 -0.8 Z" fill="url(#sa-star-grad)" />
          <circle cx="0" cy="0" r="0.7" fill="#FFFFFF" />
        </g>
      </svg>
      <div class="ring"></div>
      <div class="title">星垣工坊 · StarsAlign Studio</div>
      <div class="hint">正在启动本地服务(首次启动需初始化数据库,请稍候)…</div>
    </div>
  </body>
</html>
