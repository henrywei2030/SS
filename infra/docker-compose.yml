# =============================================================================
# StarsAlign Studio · 本地开发依赖
# 用法: pnpm infra:up  /  pnpm infra:down  /  pnpm infra:logs
# =============================================================================
name: starsalign-studio

services:
  # ---------- PostgreSQL 16 ----------
  postgres:
    image: postgres:16-alpine
    container_name: ss-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ss_user
      POSTGRES_PASSWORD: ss_pass
      POSTGRES_DB: starsalign
      # 启用 utf8mb4 类似设置确保中文 + emoji
      POSTGRES_INITDB_ARGS: '--encoding=UTF8 --locale=C'
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ss_user -d starsalign']
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------- Redis 7 (BullMQ + Cache) ----------
  redis:
    image: redis:7-alpine
    container_name: ss-redis
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes', '--maxmemory-policy', 'allkeys-lru']
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  # ---------- MinIO (S3 兼容对象存储) ----------
  minio:
    image: minio/minio:latest
    container_name: ss-minio
    restart: unless-stopped
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ss_minio_user
      MINIO_ROOT_PASSWORD: ss_minio_password
    ports:
      - '9000:9000' # S3 API
      - '9001:9001' # 控制台 UI
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------- MinIO 初始化 (创建默认 bucket) ----------
  minio-init:
    image: minio/mc:latest
    container_name: ss-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ss_minio_user ss_minio_password;
      mc mb --ignore-existing local/starsalign;
      mc anonymous set download local/starsalign;
      echo '✓ Bucket starsalign initialized';
      "

  # ---------- Hocuspocus (Y.js 协作服务器) ----------
  # Phase 1 仅分镜表使用；为简单起见也容器化
  hocuspocus:
    image: node:22-alpine
    container_name: ss-hocuspocus
    restart: unless-stopped
    working_dir: /app
    command: ['sh', '-c', 'echo "Hocuspocus 占位服务 — 由 workers 包启动" && tail -f /dev/null']
    ports:
      - '1234:1234'
    profiles:
      - collab # 仅在 W3+ 启用

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

networks:
  default:
    name: starsalign-net
    driver: bridge
