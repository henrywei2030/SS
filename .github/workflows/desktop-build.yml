name: Desktop Build (Mac + Windows)

# 桌面安装包云端构建 —— Tauri 平台原生打包不能交叉编译,Windows 安装包只能在 Windows runner 出。
# 触发:手动(workflow_dispatch)或推 v* tag。产物为【未签名】安装包(.dmg / .app / .msi / .exe);
# 签名/公证需 Apple Developer 账号 + Windows 代码签名证书(Step F,行政事项)。
on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: StarsAlign-Studio-macOS
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: StarsAlign-Studio-Windows
    runs-on: ${{ matrix.os }}
    env:
      # CI 全新 checkout 无 packages/db/.env(gitignored)→ prisma generate / web build 需 DATABASE_URL
      # 可解析(构建期不真连库,页面均 dynamic / SSG 仅 locale)。给占位串满足 Prisma 配置 + schema 解析。
      DATABASE_URL: postgresql://build:build@localhost:5432/build?schema=public
      NEXT_TELEMETRY_DISABLED: '1'
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Setup env (生成构建用占位密钥)
        run: pnpm setup:env

      - name: Prisma generate
        run: pnpm db:generate

      - name: Build web (standalone)
        run: pnpm --filter @ss/web build
        env:
          # 构建期不连库(页面均 dynamic,SSG 仅 locale 参数);给占位串满足 schema 解析
          DATABASE_URL: postgresql://build:build@localhost:5432/build?schema=public
          NEXT_TELEMETRY_DISABLED: '1'

      - name: Assemble desktop resources (node + pg + standalone)
        run: node scripts/desktop-pack.mjs

      - name: Tauri build (unsigned installer)
        run: pnpm --filter @ss/desktop exec tauri build

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          if-no-files-found: warn
          path: |
            apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg
            apps/desktop/src-tauri/target/release/bundle/macos/*.app
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi
