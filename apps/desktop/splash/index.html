<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StarsAlign Studio</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        height: 100%;
        background: #0f1b2d;
        color: #e0edf7;
        font-family: -apple-system, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
        overflow: hidden;
      }
      .wrap {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 28px;
        user-select: none;
      }
      .ring {
        width: 72px;
        height: 72px;
        border: 3px solid rgba(123, 196, 246, 0.18);
        border-top-color: #7bc4f6;
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .title {
        font-size: 20px;
        font-weight: 600;
        letter-spacing: 2px;
        background: linear-gradient(135deg, #7bc4f6, #e0edf7);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .hint { font-size: 13px; color: #5baef0; opacity: 0.8; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="ring"></div>
      <div class="title">星垣工坊 · StarsAlign Studio</div>
      <div class="hint">正在启动本地服务(首次启动需初始化数据库,请稍候)…</div>
    </div>
  </body>
</html>
